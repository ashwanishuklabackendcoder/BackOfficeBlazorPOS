          crossorigin="anonymous"

<body>
    <div id="app">

    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="enter-navigation.js"></script>
    <script src="clickOutside.js"></script>
    <script src="rte.js"></script>
    <script src="report-export.js"></script>
    <script src="payment-shortcuts.js"></script>
    <script src="https://js.stripe.com/v3/" defer></script>
    <script src="stripe-payments.js"></script>
    <script src="js/sortableTables.js"></script>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        (function () {
            if (!('serviceWorker' in navigator)) return;

            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', function () {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });

            window.addEventListener('load', async function () {
                try {
                    const registration = await navigator.serviceWorker.register('service-worker.js', {
                        updateViaCache: 'none'
                    });

                    if (registration.waiting) {
                        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                    }

                    registration.addEventListener('updatefound', function () {
                        const newWorker = registration.installing;
                        if (!newWorker) return;

                        newWorker.addEventListener('statechange', function () {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                newWorker.postMessage({ type: 'SKIP_WAITING' });
                            }
                        });
                    });

                    await registration.update();
                } catch (err) {
                    console.warn('Service worker registration failed', err);
                }
            });
        })();
    </script>
</body>

</html>
